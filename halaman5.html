<!DOCTYPE html>
<html>
<head>
<title>Bunga Harapan</title>

<style>

body{
margin:0;
height:100vh;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
}

/* halaman awal */

#intro{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
cursor:pointer;
margin-top:20px;
}

/* area bunga */

#garden{
display:none;
width:100%;
height:100%;
position:relative;
}

/* tombol lanjut */

#next{
position:absolute;
top:20px;
right:20px;
z-index:10;
}

/* bunga */

.flower{
position:absolute;
width:20px;
height:20px;
animation:grow 1.5s forwards;
}

/* kelopak */

.petal{
position:absolute;
width:20px;
height:20px;
background:pink;
border-radius:50%;
}

/* tengah bunga */

.center{
position:absolute;
width:12px;
height:12px;
background:gold;
border-radius:50%;
left:4px;
top:4px;
}

/* animasi tumbuh */

@keyframes grow{

0%{
transform:scale(0);
opacity:0;
}

100%{
transform:scale(1);
opacity:1;
}

}

</style>
</head>

<body>

<!-- halaman awal -->

<div id="intro">

<h2>
Ketuk layar kamu buat tumbuhin satu bunga,<br>
satu bunga satu harapan muuu 🌸
</h2>

<button onclick="startGarden()">Mulai</button>

</div>


<!-- taman bunga -->

<div id="garden">

<button id="next" onclick="nextPage()">Lanjut ➜</button>

</div>


<script>

function startGarden(){

document.getElementById("intro").style.display="none";
document.getElementById("garden").style.display="block";

}

/* klik layar buat bunga */

document.addEventListener("click",function(e){

let garden=document.getElementById("garden");

if(garden.style.display==="block"){

let flower=document.createElement("div");
flower.className="flower";

flower.style.left=e.clientX+"px";
flower.style.top=e.clientY+"px";

/* kelopak */

for(let i=0;i<4;i++){

let petal=document.createElement("div");
petal.className="petal";

if(i==0){petal.style.left="-10px";}
if(i==1){petal.style.left="10px";}
if(i==2){petal.style.top="-10px";}
if(i==3){petal.style.top="10px";}

flower.appendChild(petal);

}

/* tengah bunga */

let center=document.createElement("div");
center.className="center";

flower.appendChild(center);

garden.appendChild(flower);

}

});

/* ke halaman 6 */

function nextPage(){

window.location.href="halaman6.html";

}

</script>

</body>
</html>
